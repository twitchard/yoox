<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Yoox Generated App</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
  .form-group { display: flex; gap: 8px; margin: 12px 0; }
  .form-group input { flex: 1; padding: 8px; font-size: 16px; }
  button { padding: 8px 16px; cursor: pointer; font-size: 14px; }
  .list-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #eee; }
  .display { margin: 8px 0; color: #555; }
  .selector { display: flex; gap: 4px; margin: 12px 0; }
  .selector button { background: #eee; border: 1px solid #ccc; }
  .selector button.active { background: #4CAF50; color: white; border-color: #4CAF50; }
  .toggle { cursor: pointer; }
</style>
</head>
<body>
<div id="app"></div>
<script>
// === State ===
const state = {
  todos: [],
  filter: 'all'
};

// === Derived ===
function getDerived() {
  const d = {};
  d.remainingCount = state.todos.filter(t => t.field_0 === 'active').length;
  d.completedCount = state.todos.filter(t => t.field_0 === 'completed').length;
  return d;
}

// === Actions ===
function action_addTodo(arg0) {
  const text = arg0.trim();
  if (!text) return;
  state.todos.push({ type: 'Todo', field_0: 'active', field_1: text });
}

function action_markDone(arg0) {
  state.todos[arg0].field_0 = 'completed';
}

function action_markUndone(arg0) {
  state.todos[arg0].field_0 = 'active';
}

function action_removeTodo(arg0) {
  state.todos.splice(arg0, 1);
}

function action_setFilter(arg0) {
  state.filter = arg0;
}

// === Observe (state + derived) ===
function observe() {
  return { ...state, ...getDerived() };
}

// === Render ===
function render() {
  const obs = observe();
  const app = document.getElementById('app');
  app.innerHTML = '';
  {
    const el_form_3 = document.createElement('div');
    el_form_3.className = 'form-group';
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.id = 'input_form_3';
    inp.placeholder = 'task';
    const btn = document.createElement('button');
    btn.textContent = 'add todo';
    const submit = () => { doAction(() => action_addTodo(inp.value)); inp.value = ''; };
    btn.onclick = submit;
    inp.onkeydown = (e) => { if (e.key === 'Enter') submit(); };
    el_form_3.appendChild(inp);
    el_form_3.appendChild(btn);
    app.appendChild(el_form_3);
  }
  {
    const el_display_4 = document.createElement('div');
    el_display_4.className = 'display';
    el_display_4.textContent = 'filter: ' + JSON.stringify(obs.filter);
    app.appendChild(el_display_4);
  }
  {
    const el_display_5 = document.createElement('div');
    el_display_5.className = 'display';
    el_display_5.textContent = 'remaining Count: ' + JSON.stringify(obs.remainingCount);
    app.appendChild(el_display_5);
  }
  {
    const el_display_6 = document.createElement('div');
    el_display_6.className = 'display';
    el_display_6.textContent = 'completed Count: ' + JSON.stringify(obs.completedCount);
    app.appendChild(el_display_6);
  }
  {
    const list = obs.todos || [];
    list.forEach((item, idx) => {
      const row = document.createElement('div');
      row.className = 'list-item';
      const lbl = document.createElement('span');
      lbl.textContent = item.field_1;
      if (item.field_0 === 'completed') lbl.style.textDecoration = 'line-through';
      row.appendChild(lbl);
      const lbl = document.createElement('span');
      lbl.textContent = item.field_1;
      if (item.field_0 === 'completed') lbl.style.textDecoration = 'line-through';
      row.appendChild(lbl);
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.className = 'toggle';
      cb.checked = item.field_0 === 'completed';
      cb.onchange = () => doAction(() => {
        if (cb.checked) action_markDone(idx);
        else action_markUndone(idx);
      });
      row.appendChild(cb);
      const btn = document.createElement('button');
      btn.textContent = 'remove todo';
      btn.onclick = () => doAction(() => action_removeTodo(idx));
      row.appendChild(btn);
      app.appendChild(row);
    });
  }
  {
    const el_selector_12 = document.createElement('div');
    el_selector_12.className = 'selector';
    {
      const btn = document.createElement('button');
      btn.textContent = 'active';
      if (obs.filter === 'active') btn.className = 'active';
      btn.onclick = () => doAction(() => action_setFilter('active'));
      el_selector_12.appendChild(btn);
    }
    {
      const btn = document.createElement('button');
      btn.textContent = 'all';
      if (obs.filter === 'all') btn.className = 'active';
      btn.onclick = () => doAction(() => action_setFilter('all'));
      el_selector_12.appendChild(btn);
    }
    {
      const btn = document.createElement('button');
      btn.textContent = 'completed';
      if (obs.filter === 'completed') btn.className = 'active';
      btn.onclick = () => doAction(() => action_setFilter('completed'));
      el_selector_12.appendChild(btn);
    }
    app.appendChild(el_selector_12);
  }
}

// === Do (action + re-render) ===
function doAction(fn) {
  fn();
  render();
}

// Initial render
render();
</script>
</body>
</html>
